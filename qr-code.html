<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Igloo - QR Code for Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #FAF5EF;
      color: #3D2B1F;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .setup-panel {
      background: #fff;
      border-radius: 16px;
      padding: 2rem;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 2px 16px rgba(61,43,31,0.08);
      margin-bottom: 2rem;
      text-align: center;
    }

    .setup-panel h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      margin-bottom: 0.5rem;
    }

    .setup-panel p {
      font-size: 0.85rem;
      color: #6B5344;
      margin-bottom: 1rem;
    }

    .setup-panel input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid #F0E8DC;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    .setup-panel input:focus {
      border-color: #D4764E;
    }

    .setup-panel button {
      margin-top: 1rem;
      background: #D4764E;
      color: #fff;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
    }

    .setup-panel button:hover {
      background: #C96B3C;
    }

    #errorMsg {
      color: #c0392b;
      font-size: 0.8rem;
      display: none;
      margin-top: 0.5rem;
    }

    /* PRINTABLE QR CARD */
    .qr-card {
      width: 350px;
      background: #fff;
      border-radius: 20px;
      padding: 2.5rem 2rem 2rem;
      text-align: center;
      box-shadow: 0 4px 24px rgba(61,43,31,0.1);
      border: 3px solid #D4764E;
      position: relative;
      display: none;
    }

    .qr-card.show { display: block; }

    .qr-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
      background: linear-gradient(90deg, #D4764E, #E8956F, #C96B3C);
      border-radius: 20px 20px 0 0;
    }

    .qr-brand {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 800;
      color: #3D2B1F;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .qr-tagline {
      font-size: 0.75rem;
      color: #9C8578;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 0.15rem;
      margin-bottom: 1.5rem;
    }

    #qrCode {
      margin: 0 auto;
      display: flex;
      justify-content: center;
    }

    #qrCode img, #qrCode canvas {
      display: block;
    }

    .qr-label {
      margin-top: 1.5rem;
      font-size: 1rem;
      font-weight: 700;
      color: #D4764E;
      letter-spacing: 1px;
    }

    .qr-sublabel {
      font-size: 0.78rem;
      color: #9C8578;
      margin-top: 0.25rem;
    }

    .print-btn {
      margin-top: 1.5rem;
      background: #3D2B1F;
      color: #FAF5EF;
      border: none;
      padding: 0.7rem 2.5rem;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
    }

    .print-btn:hover { background: #6B5344; }

    @media print {
      body { background: #fff; }
      .setup-panel, .print-btn { display: none !important; }
      .qr-card {
        display: block !important;
        box-shadow: none;
        border: 3px solid #D4764E;
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>

  <div class="setup-panel" id="setupPanel">
    <h2>Admin Access</h2>
    <p>Enter the password to generate the menu QR code.</p>
    <input type="password" id="adminPass" placeholder="Enter password">
    <span id="errorMsg">Incorrect password</span>
    <br>
    <button onclick="authenticate()">Unlock QR Code</button>
  </div>

  <div class="qr-card" id="qrCard">
    <div class="qr-brand">IGLOO</div>
    <div class="qr-tagline">Chill. Eat. Repeat.</div>
    <div id="qrCode"></div>
    <div class="qr-label">Scan to View Menu</div>
    <div class="qr-sublabel">Place your order with the server</div>
    <br>
    <button class="print-btn" onclick="window.print()">Print QR Code</button>
  </div>

  <!-- QR Code library (qrcode.js - reliable browser library) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    // SHA-256 hash of the password (hashed so it's not visible in source)
    var PASSWORD_HASH = '7b65cef585438c625f98e245858ea5f33661aac61bc56a88d2b82d3a71b7f536';

    async function hashPassword(pass) {
      var msgBuffer = new TextEncoder().encode(pass);
      var hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      var hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
    }

    async function authenticate() {
      var pass = document.getElementById('adminPass').value;
      var hash = await hashPassword(pass);

      if (hash === PASSWORD_HASH) {
        document.getElementById('errorMsg').style.display = 'none';
        document.getElementById('setupPanel').style.display = 'none';
        generateQR();
      } else {
        document.getElementById('errorMsg').style.display = 'block';
      }
    }

    // Allow Enter key to submit
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('adminPass').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') authenticate();
      });
    });

    var MENU_URL = 'https://igloo-menu.vercel.app/';

    function generateQR() {
      if (typeof QRCode === 'undefined') {
        alert('QR library failed to load. Please refresh the page and try again.');
        return;
      }

      var qrContainer = document.getElementById('qrCode');
      qrContainer.innerHTML = '';

      new QRCode(qrContainer, {
        text: MENU_URL,
        width: 220,
        height: 220,
        colorDark: '#3D2B1F',
        colorLight: '#FFFFFF',
        correctLevel: QRCode.CorrectLevel.H
      });

      document.getElementById('qrCard').classList.add('show');
    }
  </script>

</body>
</html>
